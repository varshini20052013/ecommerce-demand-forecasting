<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DemandPro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top,#1f3c4a,#0b1c24);
font-family:"Segoe UI",sans-serif;
color:#e0e0e0;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background:#0f1f27;
box-shadow:0 4px 10px rgba(0,0,0,.4)
}

.logo{
font-size:20px;
font-weight:bold;
color:#4fc3f7
}

.nav-links a{
color:#cfd8dc;
margin-left:20px;
text-decoration:none;
font-size:14px
}

.nav-links a:hover{
color:#4fc3f7
}

.app{
width:560px;
background:#151515;
border-radius:18px;
padding:28px;
box-shadow:0 30px 60px rgba(0,0,0,.7);
margin:40px auto
}

h1{text-align:center;color:#4fc3f7}
.subtitle{text-align:center;color:#9fb3bd;margin-bottom:20px}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin-bottom:16px
}

.card{
background:#222;
border-radius:14px;
padding:14px;
text-align:center;
cursor:pointer;
border:2px solid transparent;
transition:.25s
}

.card:hover{background:#2a2a2a;transform:translateY(-4px)}
.card.active{border-color:#4fc3f7;background:#1c2c34}

.card span{font-size:26px;display:block}

label{margin-top:14px;display:block;color:#b0bec5}

input{
width:100%;
margin-top:6px;
padding:10px;
border-radius:10px;
border:none;
background:#262626;
color:white
}

button{
width:100%;
margin-top:20px;
padding:14px;
border-radius:14px;
border:none;
cursor:pointer;
font-weight:bold;
background:linear-gradient(90deg,#4fc3f7,#29b6f6)
}

.result{
margin-top:18px;
padding:14px;
background:#1f2a30;
border-radius:14px;
text-align:center
}

.chart-box{
margin-top:18px;
height:260px;
background:#101010;
border-radius:14px;
padding:10px
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">📊 DemandPro</div>
<div class="nav-links">
<a href="./dashboard.html">Dashboard</a>
<a href="./index.html">Predict</a>
<a href="./analytics.html">Analytics</a>
<a href="./inventory.html">Inventory</a>
<a href="./about.html">About</a>
</div>
</div>

<div class="app">

<h1>DemandPro</h1>
<div class="subtitle">Category → Product Demand Forecasting</div>

<div class="grid" id="categories">
<div class="card" onclick="selectCategory(this,'Electronics')"><span>⚡</span>Electronics</div>
<div class="card" onclick="selectCategory(this,'Clothing')"><span>👗</span>Clothing</div>
<div class="card" onclick="selectCategory(this,'Groceries')"><span>🛒</span>Groceries</div>
<div class="card" onclick="selectCategory(this,'Home')"><span>🏠</span>Home</div>
<div class="card" onclick="selectCategory(this,'Stationery')"><span>📚</span>Stationery</div>
<div class="card" onclick="selectCategory(this,'Sports')"><span>⚽</span>Sports</div>
</div>

<div class="grid" id="products"></div>

<label>💰 Price (₹)</label>
<input type="number" id="price" min="1" required>

<label>📅 Select Date</label>
<input type="date" id="date" required>

<button onclick="predict()">🔮 Predict Demand</button>

<div class="result" id="result">
Select category → product → enter details
</div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

</div>

<script>

const productMap = {

Electronics: [
{ name:"Phone", icon:"📱", id:"P001"},
{ name:"Laptop", icon:"💻", id:"P002"},
{ name:"Headphones", icon:"🎧", id:"P003"}
],

Clothing: [
{ name:"T-Shirt", icon:"👕", id:"P004"},
{ name:"Jeans", icon:"👖", id:"P005"},
{ name:"Jacket", icon:"🧥", id:"P006"},
{ name:"Kurti", icon:"👗", id:"P019"},
{ name:"Saree", icon:"🥻", id:"P020"},
{ name:"Dress", icon:"👗", id:"P021"},
{ name:"Top", icon:"👚", id:"P022"},
{ name:"Handbag", icon:"👜", id:"P023"}
],

Groceries: [
{ name:"Vegetables", icon:"🥦", id:"P007"},
{ name:"Milk", icon:"🥛", id:"P008"},
{ name:"Bread", icon:"🍞", id:"P009"}
],

Home: [
{ name:"Chair", icon:"🪑", id:"P010"},
{ name:"Table", icon:"🛋️", id:"P011"},
{ name:"Lamp", icon:"💡", id:"P012"}
],

Stationery: [
{ name:"Notebook", icon:"📓", id:"P013"},
{ name:"Pen", icon:"🖊️", id:"P014"},
{ name:"Backpack", icon:"🎒", id:"P015"}
],

Sports: [
{ name:"Football", icon:"⚽", id:"P016"},
{ name:"Dumbbells", icon:"🏋️", id:"P017"},
{ name:"Yoga Mat", icon:"🧘", id:"P018"}
]

}

let selectedCategory=null
let selectedProductId=null
let chart=null

function selectCategory(el,category){

document.querySelectorAll('#categories .card')
.forEach(c=>c.classList.remove('active'))

el.classList.add('active')

selectedCategory=category
selectedProductId=null

const productDiv=document.getElementById("products")
productDiv.innerHTML=""

productMap[category].forEach(p=>{

const card=document.createElement("div")
card.className="card"
card.innerHTML=`<span>${p.icon}</span>${p.name}`

card.onclick=()=>{
document.querySelectorAll('#products .card')
.forEach(c=>c.classList.remove('active'))
card.classList.add('active')
selectedProductId = p.id
}

productDiv.appendChild(card)

})
}

function detectFestival(month){

if(month===3) return {flag:1,name:"Holi"}
if(month===10||month===11) return {flag:1,name:"Diwali"}
if(month===12) return {flag:1,name:"Christmas"}
if(month===1) return {flag:1,name:"New Year"}
if(month===4||month===5) return {flag:1,name:"Eid"}
if(month===6||month===7) return {flag:1,name:"School Season"}

return {flag:0,name:null}
}

function predict(){

const price=Number(document.getElementById("price").value)
const date=document.getElementById("date").value
const result=document.getElementById("result")

if(!selectedCategory||!selectedProductId||!price||!date){
result.innerText="❌ Select product + enter details"
return
}

const d=new Date(date)
const festivalData=detectFestival(d.getMonth()+1)

fetch("http://127.0.0.1:5000/predict",{

method:"POST",
headers:{"Content-Type":"application/json"},

body:JSON.stringify({
product_id:selectedProductId,
category:selectedCategory,
price:price,
day:d.getDate(),
month:d.getMonth()+1,
day_of_week:d.getDay(),
festival:festivalData.flag
})

})

.then(r=>r.json())

.then(data=>{

if(!data || data.demand_level==="Error"){
result.innerText="❌ Backend error"
return
}

const demand=data.predicted_quantity_sold ?? 0
const level=data.demand_level ?? "Unknown"

// ✅ SAVE FOR INVENTORY PAGE
localStorage.setItem("demandData", JSON.stringify({
demand: demand,
category: selectedCategory,
festival: festivalData.name
}))

let color
if(level==="High") color="#ef5350"
else if(level==="Medium") color="#ffee58"
else color="#66bb6a"

result.innerHTML=`
<div style="font-size:18px">
📦 Predicted Demand: <b>${demand} units</b>
</div>

<div style="margin-top:8px">
Demand Level:
<span style="background:${color};padding:5px 12px;border-radius:12px;color:#000;font-weight:bold">
${level}
</span>
</div>

${festivalData.flag===1 ? `
<div style="margin-top:10px;color:#ffcc80;">
🎉 Festival: <b>${festivalData.name}</b>
</div>` : ""}

<br><br>
<button onclick="goInventory()">📦 Go to Inventory</button>
`

drawChart(demand)

})

.catch(()=>{
result.innerText="❌ Backend not running"
})

}

function goInventory(){
window.location.href="inventory.html"
}

function drawChart(demand){

if(chart) chart.destroy()

const stock=demand+Math.round(demand*0.2)

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:["Demand","Stock"],
datasets:[{
data:[demand,stock],
backgroundColor:["#4fc3f7","#66bb6a"]
}]
},

options:{maintainAspectRatio:false}

})

}

</script>

</body>
</html>
