<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DemandSense AI – Inventory Recommendation</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top,#1f3c4a,#0b1c24);
font-family:"Segoe UI",sans-serif;
color:#e0e0e0
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background:#0f1f27;
box-shadow:0 4px 10px rgba(0,0,0,.4)
}

.logo{
font-size:20px;
font-weight:bold;
color:#4fc3f7
}

.nav-links a{
color:#cfd8dc;
margin-left:20px;
text-decoration:none;
font-size:14px
}

.container{
padding:30px;
max-width:700px;
margin:auto
}

.card{
background:#151515;
border-radius:18px;
padding:26px;
box-shadow:0 20px 40px rgba(0,0,0,.6)
}

input{
width:100%;
margin-top:6px;
padding:12px;
border-radius:12px;
border:none;
background:#262626;
color:white
}

button{
width:100%;
margin-top:22px;
padding:14px;
border-radius:14px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:linear-gradient(90deg,#4fc3f7,#29b6f6);
color:#000
}

.result{
margin-top:26px;
padding:18px;
border-radius:16px;
background:#1f2a30;
text-align:center
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">📦 DemandSense AI</div>

<div class="nav-links">
<a href="./dashboard.html">Dashboard</a>
<a href="./index.html">Predict</a>
<a href="./analytics.html">Analytics</a>
<a href="./inventory.html">Inventory</a>
<a href="./about.html">About</a>
</div>
</div>

<div class="container">

<h1>Inventory Recommendation</h1>

<div class="card">

<label>📊 Predicted Demand</label>
<input type="number" id="demand" min="1" placeholder="Enter predicted demand">

<button onclick="recommend()">📦 Calculate Stock</button>

<div class="result" id="result">
Enter predicted demand to get stock recommendation
</div>

</div>

</div>

<script>

function recommend(){

const demand=Number(document.getElementById("demand").value)
const result=document.getElementById("result")

if(!demand||demand<=0){
result.innerText="❌ Please enter valid demand"
return
}

const safetyStock=Math.round(demand*0.2)
const recommended=demand+safetyStock

let level

if(demand>=60) level="High Demand – Aggressive Stock"
else if(demand>=30) level="Medium Demand – Balanced Stock"
else level="Low Demand – Conservative Stock"

result.innerHTML=`
<div style="font-size:18px">
📦 Recommended Stock: <b>${recommended} units</b>
</div>

<div style="margin-top:10px">
Strategy: ${level}
</div>
`

}

</script>

</body>
</html>
