<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DemandPro – Inventory Recommendation</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
background:radial-gradient(circle at top,#1f3c4a,#0b1c24);
font-family:"Segoe UI",sans-serif;
color:#e0e0e0
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 30px;
background:#0f1f27;
box-shadow:0 4px 10px rgba(0,0,0,.4)
}

.logo{
font-size:20px;
font-weight:bold;
color:#4fc3f7
}

.nav-links a{
color:#cfd8dc;
margin-left:20px;
text-decoration:none;
font-size:14px
}

.nav-links a:hover{
color:#4fc3f7
}

.container{
padding:30px;
max-width:700px;
margin:auto
}

.card{
background:#151515;
border-radius:18px;
padding:26px;
box-shadow:0 20px 40px rgba(0,0,0,.6)
}

label{
margin-top:12px;
display:block;
color:#b0bec5;
font-size:13px
}

input{
width:100%;
margin-top:6px;
padding:12px;
border-radius:12px;
border:none;
background:#262626;
color:white
}

button{
width:100%;
margin-top:22px;
padding:14px;
border-radius:14px;
border:none;
cursor:pointer;
font-size:16px;
font-weight:bold;
background:linear-gradient(90deg,#4fc3f7,#29b6f6);
color:#000
}

.result{
margin-top:26px;
padding:18px;
border-radius:16px;
background:#1f2a30;
text-align:center
}

.badge{
display:inline-block;
margin-top:10px;
padding:6px 14px;
border-radius:20px;
font-weight:bold;
color:#000
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo">📦 DemandPro</div>

<div class="nav-links">
<a href="./dashboard.html">Dashboard</a>
<a href="./index.html">Predict</a>
<a href="./analytics.html">Analytics</a>
<a href="./inventory.html">Inventory</a>
<a href="./about.html">About</a>
</div>
</div>

<div class="container">

<h1>Inventory Recommendation</h1>

<div class="card">

<label>📊 Predicted Demand</label>
<input type="number" id="demand">

<label>🎉 Festival</label>
<input type="text" id="festival">

<label>📂 Category</label>
<input type="text" id="category">

<button onclick="recommend()">📦 Calculate Stock</button>

<div class="result" id="result">
Loading prediction data...
</div>

</div>

</div>

<script>

// ✅ AUTO LOAD FROM PREDICT PAGE (LOCAL STORAGE)
window.onload = function(){

const stored = localStorage.getItem("demandData")

if(!stored){
document.getElementById("result").innerText = "❌ No prediction data found"
return
}

const data = JSON.parse(stored)

// Autofill fields
document.getElementById("demand").value = data.demand
document.getElementById("festival").value = data.festival || "None"
document.getElementById("category").value = data.category

// Auto calculate immediately
recommend()
}

// ✅ STOCK LOGIC
function recommend(){

const demand = Number(document.getElementById("demand").value)
const festival = document.getElementById("festival").value
const category = document.getElementById("category").value
const result = document.getElementById("result")

if(!demand || demand <= 0){
result.innerText = "❌ Please enter valid demand"
return
}

// Base stock
let stock = demand + Math.round(demand * 0.2)

let reason = "Normal stocking"
let badgeColor = "#66bb6a"

// Festival logic
if(festival && festival !== "None"){

if(category === "Clothing"){
stock += Math.round(demand * 0.4)
reason = `${festival} → High clothing demand`
badgeColor = "#ef5350"
}
else if(category === "Electronics"){
stock += Math.round(demand * 0.3)
reason = `${festival} → Electronics sales boost`
badgeColor = "#ffee58"
}
else if(category === "Groceries"){
stock += Math.round(demand * 0.25)
reason = `${festival} → Grocery demand increase`
badgeColor = "#66bb6a"
}
else{
stock += Math.round(demand * 0.2)
reason = `${festival} → General demand increase`
}
}

result.innerHTML = `
<div style="font-size:18px">
📦 Recommended Stock: <b>${stock} units</b>
</div>

<div class="badge" style="background:${badgeColor}">
${reason}
</div>
`

}

</script>

</body>
</html>
